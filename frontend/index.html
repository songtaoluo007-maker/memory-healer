<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>拾忆 - Memory Healer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      font-family: 'Noto Serif SC', 'Source Han Serif SC', 'STSong', serif;
    }
  </style>
</head>
<body>
  <div id="app" v-cloak>
    <!-- 初始加载 -->
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a1a;">
      <div style="text-align:center;">
        <div style="font-size:32px;margin-bottom:16px;">
          <span style="animation:pulse 1.5s infinite;">?</span>
        </div>
        <div style="color:rgba(232,180,80,0.6);font-size:14px;font-family:'Noto Serif SC',serif;">记忆加载中...</div>
      </div>
    </div>
    <style>
      @keyframes pulse { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.1)} }
      [v-cloak] > div:first-child { display: flex !important; }
    </style>
  </div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    // Register Service Worker for PWA offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('[拾忆] SW registered:', registration.scope)
          })
          .catch((error) => {
            console.log('[拾忆] SW registration failed:', error)
          })
      })
    }
  </script>
</body>
</html>
